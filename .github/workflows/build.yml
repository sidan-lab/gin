name: test

on:
  push:
    branches:
      - test/ci
  pull_request:
    branches:
      - main

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: [3.11]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive" # This will fetch all submodules recursively
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y swig
      - name: Install OpenSSL 1.1
        run: |
          # Add older packages repository
          sudo apt-get update
          # This may need adjustment based on the ubuntu version
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository 'deb http://security.ubuntu.com/ubuntu focal-security main'
          sudo apt-get update
          # Install OpenSSL 1.1
          sudo apt-get install -y libssl1.1
      - name: Install poetry
        run: pipx install poetry
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build submodule
        run: |
          chmod +x ./src/sidan_gin/python_signing_module/build.sh
          cd ./src/sidan_gin/python_signing_module && ./build.sh
      - name: Debug OpenSSL and module
        run: |
          # Print OpenSSL version and location
          openssl version -a

          # Show dynamic dependencies
          ldd ./src/sidan_gin/python_signing_module/src/_CardanoSigner.cpython-311-x86_64-linux-gnu.so || echo "ldd failed"

          # Check for missing symbols
          nm -D ./src/sidan_gin/python_signing_module/src/_CardanoSigner.cpython-311-x86_64-linux-gnu.so | grep DSA_SIG || echo "No DSA_SIG symbols found"

          # Check where OpenSSL is installed
          ldconfig -p | grep ssl
      - name: Install dependencies
        run: |
          poetry install
      - name: Lint with flake8
        run: |
          poetry run flake8 src --ignore E501 --exclude src/sidan_gin/python_signing_module
      - name: Run unit tests
        run: |
          poetry run pytest --doctest-modules --ignore=examples --cov=sidan_gin --cov-config=.coveragerc --cov-report=xml
      - name: poetry-check
        run: |
          poetry check
