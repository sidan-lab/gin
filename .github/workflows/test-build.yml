name: Build wheels

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
    branches:
      - main
      - test/ci

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false # Don't clone submodules yet

      - name: Checkout submodule with specific branch
        run: |
          git submodule update --init --recursive --remote

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install poetry
        run: pipx install poetry

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y swig libssl-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install swig openssl

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install swig
          choco install openssl

      - name: Build Python signing module
        shell: bash
        run: |
          cd src/sidan_gin/python_signing_module
          if [ "${{ runner.os }}" = "Windows" ]; then
            # Windows-specific build steps
            cargo build
            mkdir -p src/_binary/windows/amd64
            cp target/debug/signer.lib src/libsigner.a
            # Find the header file
            HEADER_PATH=$(find target/cxxbridge -name "lib.rs.h" -type f)
            cp "$HEADER_PATH" src/lib.rs.h
          else
            # Use the regular build script for Linux and macOS
            chmod +x build.sh
            ./build.sh
          fi

      - name: Install dependencies
        run: |
          poetry install
      - name: Lint with flake8
        run: |
          poetry run flake8 src --ignore E501 --exclude src/sidan_gin/python_signing_module
      # - name: Set up test environment
      #   run: |
      #     # Find OpenSSL 1.1 libraries
      #     export OPENSSL_1_1_PATH=$(find /usr -path "*x86_64-linux-gnu*" -name "libssl.so.1.1" | head -n 1 | xargs dirname)
      #     echo "OpenSSL 1.1 path: $OPENSSL_1_1_PATH"

      #     # Create an .env file for Poetry to load
      #     echo "LD_LIBRARY_PATH=$OPENSSL_1_1_PATH:$LD_LIBRARY_PATH" > .env
      - name: Run unit tests
        run: |
          source openssl11.env
          # Verify OpenSSL library being used
          echo "OpenSSL runtime path:"
          echo $LD_LIBRARY_PATH
          poetry run pytest --doctest-modules --ignore=examples --cov=sidan_gin --cov-config=.coveragerc --cov-report=xml
      # - name: Run unit tests
      #   run: |
      #     poetry run pytest --doctest-modules --ignore=examples --cov=sidan_gin --cov-config=.coveragerc --cov-report=xml
      - name: poetry-check
        run: |
          poetry check

      - name: Install cibuildwheel
        run: |
          python -m pip install cibuildwheel

      - name: Build wheels
        run: |
          python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_SKIP: "pp* cp27-* cp35-* cp36-* cp37-* cp38-* cp39-* cp310-*"
          # Pre-build commands if needed
          CIBW_BEFORE_BUILD: |
            python -m pip install -U setuptools wheel

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl
