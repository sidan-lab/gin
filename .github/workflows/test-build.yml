name: Build wheels

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
    branches:
      - main
      - test/ci

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Use specific branch for submodule
        run: |
          cd src/sidan_gin/python_signing_module
          git fetch --all --tags --force
          git branch -r
          git checkout 41b723c
          cd ../../..

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y swig libssl-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install swig openssl

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install swig
          choco install openssl

      - name: Build Python signing module
        shell: bash
        run: |
          cd src/sidan_gin/python_signing_module
          if [ "${{ runner.os }}" = "Windows" ]; then
            # Windows-specific build steps
            cargo build
            mkdir -p src/_binary/windows/amd64
            cp target/debug/signer.lib src/libsigner.a
            # Find the header file
            HEADER_PATH=$(find target/cxxbridge -name "lib.rs.h" -type f)
            cp "$HEADER_PATH" src/lib.rs.h
          else
            # Use the regular build script for Linux and macOS
            chmod +x build.sh
            ./build.sh
          fi

      - name: Install cibuildwheel
        run: |
          python -m pip install cibuildwheel

      - name: Build wheels
        run: |
          python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_SKIP: "pp* cp27-* cp35-* cp36-* cp37-*"
          # Pre-build commands if needed
          CIBW_BEFORE_BUILD: |
            python -m pip install -U setuptools wheel

      # - name: Upload wheels
      #   uses: actions/upload-artifact@v3
      #   with:
      #     path: ./wheelhouse/*.whl
